services:
  postgres:
    image: postgres:16
    container_name: obs-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-observability}
      POSTGRES_USER: ${POSTGRES_USER:-grafana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grafana}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grafana} -d ${POSTGRES_DB:-observability}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  grafana:
    image: grafana/grafana
    container_name: obs-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      OBS_DB_HOST: postgres
      OBS_DB_PORT: 5432
      OBS_DB_NAME: ${POSTGRES_DB:-observability}
      OBS_DB_USER: ${POSTGRES_USER:-grafana}
      OBS_DB_PASSWORD: ${POSTGRES_PASSWORD:-grafana}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy

  simulator:
    build:
      context: ./simulator
    container_name: obs-simulator
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-observability}
      DB_USER: ${POSTGRES_USER:-grafana}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-grafana}
      EVENT_BATCH_SIZE: ${EVENT_BATCH_SIZE:-25}
      EVENT_INTERVAL_SECONDS: ${EVENT_INTERVAL_SECONDS:-2}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  grafana-storage:
